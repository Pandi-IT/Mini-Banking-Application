# Application
spring.application.name=${SPRING_APP_NAME:bankease_core}

# Server
server.port=${SERVER_PORT:8082}

# Database
spring.datasource.url=jdbc:${DB_TYPE:postgresql}://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bankease_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# JWT
jwt.secret=${JWT_SECRET:your_strong_secret_key_here_min_32_chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Redis
spring.data.redis.url=${SPRING_DATA_REDIS_URL:${REDIS_URL:}}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Error handling
spring.mvc.throw-exception-if-no-handler-found=${SPRING_MVC_THROW_EXCEPTION:true}
spring.web.resources.add-mappings=${SPRING_WEB_ADD_MAPPINGS:false}