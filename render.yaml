services:
  # 1. Spring Boot Backend API Service (Web Service)
  - type: web
    name: bankease-backend
    plan: free
    runtime: docker
    dockerContext: ./Backend
    dockerfilePath: ./Backend/Dockerfile
    envVars:
      # JVM Memory Tuning for 512MB RAM Container
      - key: JAVA_OPTS
        value: "-Xmx350m -Xms256m"

      # External Database Connection (e.g., Aiven MySQL)
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      
      # External Redis Connection (e.g., Upstash Redis URL: rediss://...)
      - key: SPRING_DATA_REDIS_URL
        sync: false

      # Application security configurations
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "3600000"
      - key: SPRING_APP_NAME
        value: bankease_core

      # CORS Configuration (optional fallback if CORS is triggered outside Nginx proxy)
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:4200,http://localhost"

  # 2. Angular Frontend & Nginx Proxy (Web Service)
  - type: web
    name: bankease-frontend
    plan: free
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
