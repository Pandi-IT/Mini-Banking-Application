spring.application.name=${SPRING_APP_NAME:bankease_core}
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bankease_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}

server.port=${SERVER_PORT:8080}

# JWT settings
jwt.secret=${JWT_SECRET:your_strong_secret_key_here_min_32_chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Redis settings
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Throw exception for unmatched handlers so we can return JSON 404
spring.mvc.throw-exception-if-no-handler-found=${SPRING_MVC_THROW_EXCEPTION:true}
spring.web.resources.add-mappings=${SPRING_WEB_ADD_MAPPINGS:false}