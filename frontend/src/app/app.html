<router-outlet></router-outlet>

<!-- Global Toast Notifications -->
<div class="toasts-container">
  @for (toast of notificationService.toasts(); track toast.id) {
    <div class="toast glass" 
         [class.toast-success]="toast.type === 'success'" 
         [class.toast-error]="toast.type === 'error'" 
         [class.toast-info]="toast.type === 'info'" 
         [class.toast-warning]="toast.type === 'warning'">
      
      @if (toast.type === 'success') {
        <svg style="color: var(--success); flex-shrink: 0;" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      } @else if (toast.type === 'error') {
        <svg style="color: var(--error); flex-shrink: 0;" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      } @else if (toast.type === 'warning') {
        <svg style="color: var(--warning); flex-shrink: 0;" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      } @else {
        <svg style="color: var(--info); flex-shrink: 0;" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      }
      
      <span style="font-size: 0.875rem; font-weight: 500; word-break: break-word; flex-grow: 1;">{{ toast.message }}</span>
      
      <button class="toast-close" (click)="notificationService.clear(toast.id)">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
